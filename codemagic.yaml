workflows:
  ios:
    name: Pitch Therapy iOS
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.pitchtherapy.app
      vars:
        EXPO_APP_DIR: apps/mobile
    scripts:
      - name: Install dependencies
        script: |
          cd $EXPO_APP_DIR
          npm install
      - name: Install Expo CLI
        script: npm install -g expo-cli eas-cli
      - name: Build with EAS
        script: |
          cd $EXPO_APP_DIR
          eas build --platform ios --non-interactive --local --output build.ipa
    artifacts:
      - apps/mobile/build.ipa
  android:
    name: Pitch Therapy Android
    environment:
      vars:
        EXPO_APP_DIR: apps/mobile
    scripts:
      - name: Install dependencies
        script: |
          cd $EXPO_APP_DIR
          npm install
      - name: Install Expo CLI
        script: npm install -g expo-cli eas-cli
      - name: Build with EAS
        script: |
          cd $EXPO_APP_DIR
          eas build --platform android --non-interactive --local --output build.apk
    artifacts:
      - apps/mobile/build.apk
